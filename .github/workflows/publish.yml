name: Publish

# Manual for now — trigger from the Actions tab. Later this will move to
# "on: push of a version tag" / merge to main.
on:
  workflow_dispatch:

jobs:
  publish:
    name: build & push to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # lets the built-in GITHUB_TOKEN publish the package

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # Fail fast with a clear message if this version is already in the
      # registry. gem push also rejects a duplicate version (the hard backstop),
      # but this gives an actionable error before building. If the API read is
      # unavailable it degrades to relying on gem push.
      - name: Fail if this version is already published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          version=$(ruby -e 'require_relative "lib/aicoustics/version"; print Aicoustics::VERSION')
          published=$(gh api "/orgs/${OWNER}/packages/rubygems/aicoustics/versions" \
            --jq '.[].name' 2>/dev/null || true)
          if printf '%s\n' "$published" | grep -qx "$version"; then
            echo "::error::aicoustics ${version} is already published to GitHub Packages. Bump Aicoustics::VERSION before publishing."
            exit 1
          fi
          echo "aicoustics ${version} not yet published — proceeding."

      # The published gem carries only the Apache wrapper + ext sources; the
      # libaic binary is fetched at the consumer's install time (extconf.rb),
      # so no compile/download is needed to package it.
      - name: Build gem
        run: gem build aicoustics.gemspec

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:github: Bearer ${GITHUB_TOKEN}\n" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
          gem push --key github \
            --host "https://rubygems.pkg.github.com/${OWNER}" \
            aicoustics-*.gem
